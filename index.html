<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title> Mapa Conceitual de Cinemática</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
/* ============ TOKENS ============ */
:root{
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius-s:10px; --radius-m:16px; --radius-l:24px;
  --center-clr:#FDE68A;
  --velocidade-clr:#60A5FA;
  --aceleracao-clr:#FB923C;
  --espaco-clr:#4ADE80;
  --tempo-clr:#C084FC;
  --vetor-clr:#F472B6;
  --mu-clr:#2DD4BF;
  --muv-clr:#F87171;
  --quedalivre-clr:#FACC15;
}
[data-theme="dark"]{
  --bg:#080B16; --bg2:#0D1224; --surface:#121832; --surface2:#1A2140;
  --text:#EAEDF9; --text-dim:#8D95B8; --border:#232B4E; --border-soft:#1A2140;
  --shadow:0 20px 60px rgba(0,0,0,.5);
  --grid-line: rgba(255,255,255,.03);
}
[data-theme="light"]{
  --bg:#F4F1E8; --bg2:#ECE7D8; --surface:#FFFFFF; --surface2:#FBF9F2;
  --text:#1C1E2B; --text-dim:#666B85; --border:#DED6BE; --border-soft:#E8E1CC;
  --shadow:0 20px 50px rgba(60,50,20,.12);
  --grid-line: rgba(0,0,0,.035);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body);
  overflow:hidden; transition:background .4s ease,color .4s ease;
}
::selection{background:var(--velocidade-clr); color:#08101f;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.001s !important; transition-duration:.001s !important;} }

/* ============ APP SHELL ============ */
#app{position:relative; width:100vw; height:100vh; overflow:hidden;}

#particleBg{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.6;}

/* ---- top bar ---- */
#topbar{
  position:fixed; top:0; left:0; right:0; z-index:40;
  display:flex; align-items:center; gap:14px;
  padding:14px 20px; background:linear-gradient(to bottom, var(--bg) 60%, transparent);
  pointer-events:none;
}
#topbar > *{pointer-events:auto;}
.brand{display:flex; align-items:center; gap:10px; margin-right:6px;}
.brand-mark{
  width:34px; height:34px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--center-clr), #E8A93A 70%);
  box-shadow:0 0 18px rgba(253,230,138,.55);
  position:relative; flex:none;
}
.brand-mark::after{
  content:""; position:absolute; inset:-6px; border:1.5px solid rgba(253,230,138,.4); border-radius:50%;
  animation:spin 10s linear infinite;
}
.brand-mark::before{
  content:""; position:absolute; inset:-11px; border:1px dashed rgba(253,230,138,.22); border-radius:50%;
  animation:spin 18s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg);}}
.brand-text{display:flex; flex-direction:column; line-height:1.05;}
.brand-text b{font-family:var(--font-display); font-size:16px; letter-spacing:.2px;}
.brand-text span{font-size:10.5px; color:var(--text-dim); letter-spacing:.4px; text-transform:uppercase;}

.searchWrap{position:relative; flex:1; max-width:340px;}
.searchWrap input{
  width:100%; padding:10px 14px 10px 36px; border-radius:999px; border:1px solid var(--border);
  background:var(--surface); color:var(--text); font-size:13.5px; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.searchWrap input:focus{border-color:var(--velocidade-clr); box-shadow:0 0 0 3px rgba(96,165,250,.15);}
.searchWrap svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.5; width:15px; height:15px;}
#searchResults{
  position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius-m); overflow:hidden; box-shadow:var(--shadow);
  display:none; max-height:260px; overflow-y:auto; z-index:60;
}
#searchResults.show{display:block;}
.searchItem{display:flex; align-items:center; gap:10px; padding:9px 12px; font-size:13px; cursor:pointer;}
.searchItem:hover{background:var(--surface2);}
.searchDot{width:9px; height:9px; border-radius:50%; flex:none;}

.iconBtn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--surface);
  color:var(--text); display:flex; align-items:center; justify-content:center; transition:.2s;
  flex:none;
}
.iconBtn:hover{border-color:var(--velocidade-clr); transform:translateY(-1px);}
.iconBtn svg{width:17px; height:17px;}

.xpBadge{
  display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border);
  border-radius:999px; padding:6px 12px 6px 6px; font-size:12px;
}
.xpBadge .lvl{
  width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--center-clr),#e8a93a);
  color:#3a2c05; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:11px;
}
.xpBadge .xpbar{width:70px; height:5px; border-radius:3px; background:var(--border); overflow:hidden;}
.xpBadge .xpbar > i{display:block; height:100%; background:linear-gradient(90deg,var(--velocidade-clr),var(--vetor-clr)); transition:width .5s ease;}
.xpBadge .xptext{color:var(--text-dim); font-family:var(--font-mono); font-size:10.5px; white-space:nowrap;}

/* breadcrumb */
#breadcrumb{
  position:fixed; top:66px; left:20px; z-index:35; display:flex; align-items:center; gap:6px;
  font-size:12px; color:var(--text-dim); background:var(--surface); border:1px solid var(--border);
  padding:6px 12px; border-radius:999px; box-shadow:var(--shadow); font-family:var(--font-mono);
}
#breadcrumb b{color:var(--text); cursor:pointer;}
#breadcrumb .sep{opacity:.4;}
#breadcrumb .curr{color:var(--velocidade-clr); font-weight:600;}

/* progress bar overall */
#progressWrap{
  position:fixed; top:0; left:0; right:0; height:3px; z-index:50; background:transparent;
}
#progressBar{height:100%; width:0%; background:linear-gradient(90deg,var(--velocidade-clr),var(--vetor-clr),var(--center-clr)); transition:width .6s ease; box-shadow:0 0 10px rgba(96,165,250,.6);}

/* ---- MAP ---- */
#mapViewport{position:absolute; inset:0; z-index:1; cursor:grab;}
#mapViewport.dragging{cursor:grabbing;}
#mapInner{position:absolute; left:50%; top:50%; width:0; height:0; transform-origin:0 0;}
#linesSvg{position:absolute; overflow:visible; pointer-events:none;}
.mapLine{fill:none; stroke-width:1.6; stroke-dasharray:5 7; opacity:.35; transition:opacity .35s, stroke .35s;}
.mapLine.active{opacity:.95; stroke-width:2.4;}
.mapLine.dim{opacity:.06;}
@keyframes dashmove{to{stroke-dashoffset:-120;}}
.mapLine{animation:dashmove 5s linear infinite;}

.node{
  position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center;
  gap:8px; cursor:pointer; transition:opacity .35s ease, filter .35s ease; user-select:none;
}
.node.dim{opacity:.22; filter:saturate(.3);}
.node.active .nodeOrb{transform:scale(1.12);}
.nodeOrb{
  width:var(--size,86px); height:var(--size,86px); border-radius:50%;
  background:var(--surface); border:2px solid var(--nc);
  display:flex; align-items:center; justify-content:center; font-size:calc(var(--size,86px) * .4);
  box-shadow:0 0 0 rgba(0,0,0,0), inset 0 0 20px rgba(255,255,255,.02);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease, border-color .3s;
  position:relative;
}
.nodeOrb::before{
  content:""; position:absolute; inset:-9px; border-radius:50%; border:1px solid var(--nc); opacity:.25;
}
.node:hover .nodeOrb{transform:scale(1.08); box-shadow:0 0 26px var(--nc-glow,rgba(96,165,250,.5));}
.node.visited .nodeOrb::after{
  content:"✓"; position:absolute; bottom:-2px; right:-2px; width:20px; height:20px; border-radius:50%;
  background:var(--nc); color:#0a0f1e; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;
  border:2px solid var(--surface);
}
.node.center .nodeOrb{box-shadow:0 0 40px rgba(253,230,138,.35);}
.nodeLabel{font-family:var(--font-display); font-weight:600; font-size:12.5px; text-align:center; max-width:120px; color:var(--text);}
.node.center .nodeLabel{font-size:14px;}
.nodeSub{font-size:9.5px; color:var(--text-dim); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.4px;}

/* zoom controls */
#zoomCtrls{position:fixed; right:20px; bottom:26px; z-index:35; display:flex; flex-direction:column; gap:8px;}
#zoomCtrls button{
  width:38px; height:38px; border-radius:12px; background:var(--surface); border:1px solid var(--border);
  color:var(--text); font-size:17px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow);
}
#zoomCtrls button:hover{border-color:var(--velocidade-clr);}

/* history widget */
#historyBtn{position:fixed; left:20px; bottom:26px; z-index:35;}
#historyPanel{
  position:fixed; left:20px; bottom:74px; z-index:36; width:250px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius-m); box-shadow:var(--shadow); padding:10px;
  display:none; max-height:280px; overflow-y:auto;
}
#historyPanel.show{display:block;}
#historyPanel h4{margin:2px 6px 8px; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-dim); font-family:var(--font-mono);}
.histItem{display:flex; align-items:center; gap:8px; padding:8px 8px; border-radius:10px; font-size:12.5px;}
.histItem:hover{background:var(--surface2);}
.histDot{width:8px; height:8px; border-radius:50%; flex:none;}
.histItem span{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.histItem time{color:var(--text-dim); font-size:10px; font-family:var(--font-mono);}
.histEmpty{padding:14px 8px; color:var(--text-dim); font-size:12px;}

/* ============ DRAWER ============ */
#overlay{position:fixed; inset:0; background:rgba(4,6,14,.55); backdrop-filter:blur(2px); z-index:70; opacity:0; pointer-events:none; transition:opacity .3s ease;}
#overlay.show{opacity:1; pointer-events:auto;}

#drawer{
  position:fixed; top:0; right:0; height:100%; width:480px; max-width:94vw; background:var(--bg2);
  border-left:1px solid var(--border); z-index:80; box-shadow:var(--shadow);
  transform:translateX(105%); transition:transform .42s cubic-bezier(.19,1,.22,1);
  display:flex; flex-direction:column;
}
#drawer.open{transform:translateX(0);}
.drawerHead{
  padding:22px 22px 0; flex:none; position:relative; overflow:hidden;
}
.drawerHead::before{
  content:""; position:absolute; top:-60px; right:-60px; width:180px; height:180px; border-radius:50%;
  background:var(--nc,var(--velocidade-clr)); opacity:.16; filter:blur(20px);
}
.drawerTop{display:flex; justify-content:space-between; align-items:flex-start; position:relative;}
.drawerClose{
  width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:var(--surface);
  display:flex; align-items:center; justify-content:center; color:var(--text); flex:none;
}
.drawerTitleRow{display:flex; align-items:center; gap:12px; margin-top:4px; position:relative;}
.drawerEmoji{
  width:52px; height:52px; border-radius:16px; background:var(--surface); border:2px solid var(--nc);
  display:flex; align-items:center; justify-content:center; font-size:26px; flex:none;
}
.drawerTitle h2{margin:0; font-family:var(--font-display); font-size:22px;}
.drawerTitle p{margin:2px 0 0; font-size:12px; color:var(--text-dim); font-family:var(--font-mono);}

.tabs{display:flex; gap:4px; padding:16px 22px 0; border-bottom:1px solid var(--border-soft); flex:none; overflow-x:auto;}
.tabBtn{
  background:none; border:none; color:var(--text-dim); padding:9px 12px; font-size:12.5px; font-weight:600;
  border-bottom:2px solid transparent; white-space:nowrap; display:flex; align-items:center; gap:6px;
  font-family:var(--font-body);
}
.tabBtn.active{color:var(--text); border-color:var(--nc,var(--velocidade-clr));}
.tabBody{flex:1; overflow-y:auto; padding:20px 22px 34px;}
.tabPane{display:none; animation:fadeUp .35s ease;}
.tabPane.active{display:block;}
@keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

.sectionLabel{font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--text-dim); margin:20px 0 8px;}
.sectionLabel:first-child{margin-top:0;}
.bodyText{font-size:14px; line-height:1.65; color:var(--text);}
.chipRow{display:flex; flex-wrap:wrap; gap:8px;}
.chip{background:var(--surface); border:1px solid var(--border); padding:6px 11px; border-radius:999px; font-size:12px;}
ul.niceList{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px;}
ul.niceList li{
  background:var(--surface); border:1px solid var(--border-soft); border-radius:12px; padding:10px 12px; font-size:13px;
  display:flex; gap:9px; align-items:flex-start; line-height:1.5;
}
ul.niceList li::before{content:"›"; color:var(--nc,var(--velocidade-clr)); font-weight:700;}
.imgRow{display:flex; gap:10px; overflow-x:auto; padding-bottom:4px;}
.imgRow img{width:150px; height:100px; object-fit:cover; border-radius:12px; border:1px solid var(--border); flex:none;}

.formulaCard{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-m); padding:16px; margin-bottom:14px;}
.formula-tex{font-size:20px; text-align:center; padding:10px 0;}
.varList{display:flex; flex-direction:column; gap:6px; margin-top:8px;}
.varRow{display:flex; gap:10px; font-size:12.5px; align-items:baseline;}
.varRow .sym{font-family:var(--font-mono); color:var(--nc,var(--velocidade-clr)); min-width:44px; font-weight:600;}

.videoGrid{display:flex; flex-direction:column; gap:12px;}
.videoFrameWrap{border-radius:var(--radius-m); overflow:hidden; border:1px solid var(--border); aspect-ratio:16/9; background:#000;}
.videoFrameWrap iframe{width:100%; height:100%; border:0;}
.videoThumbs{display:flex; gap:10px; overflow-x:auto;}
.vThumb{flex:none; width:130px; cursor:pointer; border-radius:10px; overflow:hidden; border:2px solid transparent; opacity:.7;}
.vThumb.active{border-color:var(--nc,var(--velocidade-clr)); opacity:1;}
.vThumb img{width:100%; display:block; aspect-ratio:16/9; object-fit:cover;}
.vThumb .vt-title{font-size:10.5px; padding:5px 6px; line-height:1.3; color:var(--text-dim);}

.simBox{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-m); padding:14px; overflow:hidden;}
.simCanvasWrap{border-radius:12px; overflow:hidden; background:linear-gradient(180deg, var(--bg2), var(--surface2)); border:1px solid var(--border-soft);}
.simCtrls{display:flex; align-items:center; gap:10px; margin-top:12px; flex-wrap:wrap;}
.simBtn{
  background:var(--nc,var(--velocidade-clr)); color:#08101f; border:none; padding:8px 14px; border-radius:999px;
  font-size:12.5px; font-weight:700; display:flex; align-items:center; gap:6px;
}
.simBtn.secondary{background:var(--surface2); color:var(--text); border:1px solid var(--border);}
.simRange{display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--text-dim); font-family:var(--font-mono);}
.simRange input{accent-color:var(--nc,var(--velocidade-clr));}
.simReadout{font-family:var(--font-mono); font-size:12px; background:var(--bg2); padding:6px 10px; border-radius:8px; color:var(--nc,var(--velocidade-clr));}

.quizQ{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-m); padding:16px; margin-bottom:14px;}
.quizQ .qtext{font-size:13.5px; font-weight:600; margin-bottom:10px;}
.qopt{display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:10px; font-size:13px; border:1px solid var(--border-soft); margin-bottom:6px; transition:.2s;}
.qopt:hover{border-color:var(--nc,var(--velocidade-clr));}
.qopt input{accent-color:var(--nc,var(--velocidade-clr));}
.qopt.correct{border-color:#4ADE80; background:rgba(74,222,128,.08);}
.qopt.wrong{border-color:#F87171; background:rgba(248,113,113,.08);}
.qExplain{font-size:12px; color:var(--text-dim); margin-top:8px; padding-top:8px; border-top:1px dashed var(--border-soft); display:none; line-height:1.5;}
.qExplain.show{display:block;}
#quizFooter{display:flex; align-items:center; gap:12px; margin-top:6px;}
#quizScoreBadge{font-family:var(--font-mono); font-size:12px; color:var(--text-dim);}

/* ============ TOAST ============ */
#toastWrap{position:fixed; top:70px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center;}
.toast{
  background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow); border-radius:999px;
  padding:9px 18px; font-size:12.5px; display:flex; align-items:center; gap:8px; animation:toastIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes toastIn{from{opacity:0; transform:translateY(-14px) scale(.9);} to{opacity:1; transform:translateY(0) scale(1);}}
.toast.badge{border-color:var(--center-clr); background:linear-gradient(90deg, rgba(253,230,138,.15), var(--surface));}

/* ============ ADMIN ============ */
#adminOverlay{
  position:fixed; inset:0; background:var(--bg); z-index:150; display:none; flex-direction:column;
}
#adminOverlay.show{display:flex;}
.adminHead{display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); flex:none;}
.adminHead h2{font-family:var(--font-display); margin:0; font-size:19px;}
.adminBody{flex:1; overflow-y:auto; padding:22px 24px 60px; display:grid; grid-template-columns:280px 1fr; gap:24px;}
@media (max-width:860px){.adminBody{grid-template-columns:1fr;}}
.adminList{display:flex; flex-direction:column; gap:8px;}
.adminListItem{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 12px; font-size:13px;}
.adminListItem b{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.adminListItem button{background:none; border:none; color:var(--text-dim); font-size:14px;}
.adminListItem button:hover{color:#F87171;}
.newConceptBtn{background:var(--velocidade-clr); color:#08101f; border:none; border-radius:12px; padding:11px; font-weight:700; font-size:13px;}

.field{margin-bottom:16px;}
.field label{display:block; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--text-dim); margin-bottom:6px; font-family:var(--font-mono);}
.field input[type=text], .field input[type=number], .field textarea, .field select{
  width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 12px;
  color:var(--text); font-size:13px; outline:none;
}
.field input[type=color]{width:60px; height:38px; border:1px solid var(--border); border-radius:10px; background:var(--surface); padding:2px;}
.field textarea{resize:vertical; min-height:70px; font-family:var(--font-mono); font-size:12px; line-height:1.5;}
.field small{display:block; color:var(--text-dim); font-size:11px; margin-top:5px; line-height:1.4;}
.fieldRow{display:flex; gap:14px; flex-wrap:wrap;}
.fieldRow > .field{flex:1; min-width:140px;}
.checkGrid{display:flex; flex-wrap:wrap; gap:8px;}
.checkGrid label{display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:6px 12px; font-size:12px; text-transform:none; letter-spacing:0; font-family:var(--font-body);}
.saveBar{display:flex; gap:10px; margin-top:20px; position:sticky; bottom:0; background:var(--bg); padding:14px 0;}
.btnPrimary{background:var(--velocidade-clr); color:#08101f; border:none; padding:11px 20px; border-radius:12px; font-weight:700; font-size:13px;}
.btnGhost{background:var(--surface); color:var(--text); border:1px solid var(--border); padding:11px 20px; border-radius:12px; font-size:13px;}

/* ============ MOBILE ============ */
@media (max-width:640px){
  #drawer{width:100%; max-width:100%; top:auto; bottom:0; height:88vh; right:0; left:0; border-left:none; border-top:1px solid var(--border); border-radius:24px 24px 0 0; transform:translateY(105%);}
  #drawer.open{transform:translateY(0);}
  .searchWrap{max-width:120px;}
  .brand-text{display:none;}
  #breadcrumb{left:12px; top:60px; font-size:10.5px;}
  .xpBadge .xpbar{width:38px;}
  #historyBtn{left:12px;} #zoomCtrls{right:12px;}

async function saveState(){
  if(!hasStorage) return;
  try{
    await window.storage.set("physics-lo-state", JSON.stringify({
      theme:state.theme, xp:state.xp, visited:state.visited, badges:state.badges,
      quizScores:state.quizScores, history:state.history
    }), false);
  }catch(e){ console.warn("save state failed", e); }
}
async function saveConcepts(){
  if(!hasStorage) return;
  try{
    await window.storage.set("physics-lo-concepts", JSON.stringify(CONCEPT_ORDER.map(id=>CONCEPTS[id])), false);
  }catch(e){ console.warn("save concepts failed", e); }
}
async function loadAll(){
  if(hasStorage){
    try{
      const s = await window.storage.get("physics-lo-state");
      if(s && s.value){
        const parsed = JSON.parse(s.value);
        Object.assign(state, parsed);
      }
    }catch(e){ /* no saved state yet */ }
    try{
      const c = await window.storage.get("physics-lo-concepts");
      if(c && c.value){
        const parsed = JSON.parse(c.value);
        if(Array.isArray(parsed) && parsed.length) loadConceptsIntoMemory(parsed);
      }
    }catch(e){ /* no saved concepts yet */ }
  }
  applyTheme(state.theme || "dark");
  buildMap();
  renderBreadcrumb();
  renderHistory();
  renderGamificationBar();
  renderProgress();
}

const pCanvas = document.getElementById("particleBg");
const pCtx = pCanvas.getContext("2d");
let particles = [];
function initParticles(){
  pCanvas.width = innerWidth; pCanvas.height = innerHeight;
  const n = Math.min(70, Math.floor((innerWidth*innerHeight)/22000));
  particles = Array.from({length:n},()=>({
    x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    r:Math.random()*1.6+0.4, vx:(Math.random()-0.5)*0.15, vy:(Math.random()-0.5)*0.15,
    a:Math.random()*0.5+0.15
  }));
}
function drawParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  const isDark = state.theme==="dark";
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=innerWidth; if(p.x>innerWidth)p.x=0;
    if(p.y<0)p.y=innerHeight; if(p.y>innerHeight)p.y=0;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.r,0,7);
    pCtx.fillStyle = isDark ? `rgba(180,200,255,${p.a})` : `rgba(90,90,60,${p.a*0.5})`;
    pCtx.fill();
  });
  requestAnimationFrame(drawParticles);
}
window.addEventListener("resize", initParticles);
initParticles(); drawParticles();

====================================================================== */
const viewport = document.getElementById("mapViewport");
const mapInner = document.getElementById("mapInner");
const linesSvg = document.getElementById("linesSvg");

function polar(angleDeg, r){
  const rad = (angleDeg-90) * Math.PI/180;
  return {x: r*Math.cos(rad), y: r*Math.sin(rad)};
}

function buildMap(){
  // clear existing nodes
  mapInner.querySelectorAll(".node").forEach(n=>n.remove());
  linesSvg.innerHTML = "";
  linesSvg.setAttribute("width", 3000); linesSvg.setAttribute("height", 3000);
  linesSvg.setAttribute("viewBox","-1500 -1500 3000 3000");
  linesSvg.style.left="-1500px"; linesSvg.style.top="-1500px";

  const center = CONCEPT_ORDER.map(id=>CONCEPTS[id]).find(c=>c.isCenter) || CONCEPTS[CONCEPT_ORDER[0]];

  // lines: center -> each other node, plus relation lines between siblings (subtle)
  CONCEPT_ORDER.forEach(id=>{
    const c = CONCEPTS[id];
    if(c.isCenter) return;
    const p = polar(c.angle, c.radius);
    const line = document.createElementNS("http://www.w3.org/2000/svg","path");
    line.setAttribute("d", `M0,0 L${p.x},${p.y}`);
    line.setAttribute("class","mapLine");
    line.setAttribute("stroke", c.colorHex || "#60A5FA");
    line.dataset.a = "cinematica"; line.dataset.b = id;
    linesSvg.appendChild(line);
  });

  // nodes
  CONCEPT_ORDER.forEach(id=>{
    const c = CONCEPTS[id];
    const pos = c.isCenter ? {x:0,y:0} : polar(c.angle, c.radius);
    const node = document.createElement("div");
    node.className = "node" + (c.isCenter?" center":"") + (state.visited.includes(id)?" visited":"");
    node.style.left = pos.x+"px"; node.style.top = pos.y+"px";
    node.style.setProperty("--nc", c.colorHex);
    node.dataset.id = id;
    node.innerHTML = `
      <div class="nodeOrb" style="--size:${c.size||90}px;">${c.icon||"⚛"}</div>
      <div class="nodeLabel">${c.name}</div>
      ${!c.isCenter?'<div class="nodeSub">Cinemática</div>':''}
    `;
    node.addEventListener("click", (e)=>{ e.stopPropagation(); openConcept(id); });
    mapInner.appendChild(node);
  });

  centerMapView();
}

function centerMapView(){
  state.panX = 0; state.panY = 0; state.zoom = window.innerWidth<640?0.62:0.85;
  applyMapTransform();
}
function applyMapTransform(){
  mapInner.style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.zoom})`;
  document.getElementById("zoomReset").textContent = Math.round(state.zoom*100)+"%";
}

// pan (drag)
let dragging=false, dragStart={x:0,y:0}, panStart={x:0,y:0};
viewport.addEventListener("pointerdown", (e)=>{
  if(e.target.closest(".node")) return;
  dragging = true; viewport.classList.add("dragging");
  dragStart = {x:e.clientX, y:e.clientY}; panStart = {x:state.panX, y:state.panY};
  viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener("pointermove", (e)=>{
  if(!dragging) return;
  state.panX = panStart.x + (e.clientX-dragStart.x);
  state.panY = panStart.y + (e.clientY-dragStart.y);
  applyMapTransform();
});
["pointerup","pointercancel","pointerleave"].forEach(ev=>viewport.addEventListener(ev, ()=>{
  dragging=false; viewport.classList.remove("dragging");
}));

// zoom (wheel + buttons)
viewport.addEventListener("wheel",(e)=>{
  e.preventDefault();
  const delta = e.deltaY>0 ? -0.08 : 0.08;
  state.zoom = Math.min(2, Math.max(0.35, state.zoom+delta));
  applyMapTransform();
}, {passive:false});
document.getElementById("zoomIn").onclick = ()=>{ state.zoom=Math.min(2,state.zoom+0.15); applyMapTransform(); };
document.getElementById("zoomOut").onclick = ()=>{ state.zoom=Math.max(0.35,state.zoom-0.15); applyMapTransform(); };
document.getElementById("zoomReset").onclick = centerMapView;

function highlightRelated(id){
  const c = CONCEPTS[id];
  const related = new Set([id, ...(c && c.related ? c.related : []), "cinematica"]);
  document.querySelectorAll(".node").forEach(n=>{
    n.classList.toggle("dim", !related.has(n.dataset.id));
    n.classList.toggle("active", n.dataset.id===id);
  });
  document.querySelectorAll(".mapLine").forEach(l=>{
    const rel = related.has(l.dataset.a) && related.has(l.dataset.b);
    l.classList.toggle("active", rel && (l.dataset.b===id || l.dataset.a===id));
    l.classList.toggle("dim", !rel);
  });
}
function clearHighlight(){
  document.querySelectorAll(".node").forEach(n=>n.classList.remove("dim","active"));
  document.querySelectorAll(".mapLine").forEach(l=>l.classList.remove("dim","active"));
}
viewport.addEventListener("click",(e)=>{ if(e.target===viewport || e.target===mapInner) { /* background click: no-op for now */ } });

const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", ()=>{

  if(!q){ searchResults.classList.remove("show"); return; }
  const matches = CONCEPT_ORDER.map(id=>CONCEPTS[id]).filter(c=>c.name.toLowerCase().includes(q));

    searchResults.innerHTML = matches.map(c=>`

        <span class="searchDot" style="background:${c.colorHex}"></span>
        <span>${c.icon} ${c.name}</span>

  }
  searchResults.classList.add("show");
});
searchResults.addEventListener("click",(e)=>{
  const item = e.target.closest(".searchItem"); if(!item || !item.dataset.id) return;
  searchResults.classList.remove("show"); searchInput.value="";

  openConcept(item.dataset.id);

function focusNode(id){
  const c = CONCEPTS[id]; if(!c) return;
  const pos = c.isCenter ? {x:0,y:0} : polar(c.angle,c.radius);
  state.panX = -pos.x*state.zoom; state.panY = -pos.y*state.zoom;
  applyMapTransform();
}

  document.getElementById("xpFill").style.width = pct+"%";

  state.xp += n;
  renderGamificationBar();
  toast(`✨ +${n} XP <span style="opacity:.6">· ${reason}</span>`);
  checkBadges();
  saveState();
}
function checkBadges(){
  BADGE_DEFS.forEach(b=>{
    if(!state.badges.includes(b.id) && b.cond(state)){
      state.badges.push(b.id);
      toast(`${b.icon} <b>Conquista desbloqueada:</b> ${b.label}`, true);
    }
  });
}
function visitConcept(id){
  const firstVisit = !state.visited.includes(id);
  if(firstVisit){
    state.visited.push(id);
    renderProgress();
    addXP(10, "primeira visita: "+CONCEPTS[id].name);
  }
  state.history.unshift({id, t:Date.now()});
  state.history = state.history.slice(0,20);
  renderHistory();
  saveState();
}

function toggleSim(c){
  if(simState.running) stopSim(); else startSim(c);
}
function resetSim(c){ stopSim(); simState.t=0; drawSimFrame(c, true); }
function stopSim(){
  simState.running=false;
  if(simState.raf) cancelAnimationFrame(simState.raf);
  const btn = document.getElementById("simPlay"); if(btn) btn.textContent="▶ Iniciar";
}
function startSim(c){
  if(!c || !document.getElementById("simCanvas")) return;
  simState.running = true; simState.type = c.sim;
  const btn = document.getElementById("simPlay"); if(btn) btn.textContent="⏸ Pausar";
  let last = performance.now();
  function loop(now){
    if(!simState.running) return;
    const dt = Math.min(0.05,(now-last)/1000); last = now;
    if(c.sim!=="vector") simState.t += dt;
    drawSimFrame(c, false);
    simState.raf = requestAnimationFrame(loop);
  }
  simState.raf = requestAnimationFrame(loop);
}

function drawSimFrame(c, resetOnly){
  const canvas = simState.canvas; if(!canvas) return;
  const ctx = simState.ctx;
  const W = canvas.width, H = canvas.height;
  const styles = getComputedStyle(document.body);
  const groundClr = styles.getPropertyValue("--border").trim() || "#333";
  const accClr = c.colorHex;
  ctx.clearRect(0,0,W,H);

  if(c.sim==="uniform"){
    const vInput = document.getElementById("simV");
    const v = vInput ? Number(vInput.value) : 40;
    const speed = v/100; // px factor
    const x = 40 + ((simState.t*speed*260) % (W-100));
    ctx.strokeStyle = groundClr; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(20,H-40); ctx.lineTo(W-20,H-40); ctx.stroke();
    drawCar(ctx, x, H-40, accClr);
    document.getElementById("simReadout").textContent = `t = ${simState.t.toFixed(1)} s · v = ${v} km/h`;
  }
  else if(c.sim==="accelerated"){
    const aInput = document.getElementById("simA");
    const a = aInput ? Number(aInput.value) : 4;
    let dist = 0.5*a*simState.t*simState.t*4;
    if(dist > W-100){ simState.t=0; dist=0; }
    const x = 40+dist;
    ctx.strokeStyle = groundClr; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(20,H-40); ctx.lineTo(W-20,H-40); ctx.stroke();
    drawCar(ctx, x, H-40, accClr, true);
    const v = a*simState.t;
    document.getElementById("simReadout").textContent = `t = ${simState.t.toFixed(1)} s · v ≈ ${v.toFixed(1)} m/s`;
  }
  else if(c.sim==="freefall"){
    const gInput = document.getElementById("simG");
    const g = gInput ? Number(gInput.value) : 10;
    let y = 30 + 0.5*g*simState.t*simState.t*6;
    if(y > H-50){ simState.t=0; y=30; }
    ctx.strokeStyle = groundClr; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(20,H-30); ctx.lineTo(W-20,H-30); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2,y,14,0,7); ctx.fillStyle=accClr; ctx.fill();
    const v = g*simState.t;
    document.getElementById("simReadout").textContent = `t = ${simState.t.toFixed(1)} s · v ≈ ${v.toFixed(1)} m/s`;
  }
  else if(c.sim==="vector"){
    drawVectorSim(ctx, W, H, accClr);
    document.getElementById("simReadout").textContent = `A+B calculado ao vivo`;
  }
}
function drawCar(ctx,x,groundY,clr,tilt){
  ctx.save(); ctx.translate(x, groundY-16);
  ctx.fillStyle = clr; ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(-24,-14,48,20,6) : ctx.rect(-24,-14,48,20);
  ctx.fill();
  ctx.beginPath(); ctx.arc(-12,8,6,0,7); ctx.arc(12,8,6,0,7);
  ctx.fillStyle="#222"; ctx.fill();
  ctx.restore();
}
let vecA = {x:80,y:180}, vecB={x:70,y:-60};
const vecOrigin = {x:120,y:190};
function drawVectorSim(ctx,W,H,clr){
  ctx.save(); ctx.translate(vecOrigin.x, vecOrigin.y);
  drawArrow(ctx, 0,0, vecA.x,vecA.y, "#60A5FA", "A");
  drawArrow(ctx, 0,0, vecB.x,vecB.y, "#F472B6", "B");
  ctx.setLineDash([6,5]);
  drawArrow(ctx, 0,0, vecA.x+vecB.x, vecA.y+vecB.y, "#4ADE80", "R", true);
  ctx.setLineDash([]);
  ctx.restore();
  // handles
  ctx.fillStyle="#60A5FA"; ctx.beginPath(); ctx.arc(vecOrigin.x+vecA.x, vecOrigin.y+vecA.y, 7,0,7); ctx.fill();
  ctx.fillStyle="#F472B6"; ctx.beginPath(); ctx.arc(vecOrigin.x+vecB.x, vecOrigin.y+vecB.y, 7,0,7); ctx.fill();
}
function drawArrow(ctx,x1,y1,x2,y2,clr,label){
  ctx.strokeStyle=clr; ctx.fillStyle=clr; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const ang = Math.atan2(y2-y1,x2-x1);
  ctx.beginPath(); ctx.moveTo(x2,y2);
  ctx.lineTo(x2-12*Math.cos(ang-0.4), y2-12*Math.sin(ang-0.4));
  ctx.lineTo(x2-12*Math.cos(ang+0.4), y2-12*Math.sin(ang+0.4));
  ctx.closePath(); ctx.fill();
  ctx.font="12px sans-serif"; ctx.fillText(label, x2+8, y2);
}
let draggingVec = null;
document.addEventListener("pointerdown",(e)=>{
  const canvas = document.getElementById("simCanvas");
  if(!canvas || !simState.selectedIsVector()) return;
});
// simplified: attach vector drag handlers each time canvas is (re)created
function attachVectorDrag(){
  const canvas = document.getElementById("simCanvas"); if(!canvas) return;
  canvas.addEventListener("pointerdown",(e)=>{
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    const mx = (e.clientX-rect.left)*scaleX - vecOrigin.x, my = (e.clientY-rect.top)*scaleY - vecOrigin.y;
    const dA = Math.hypot(mx-vecA.x, my-vecA.y), dB = Math.hypot(mx-vecB.x, my-vecB.y);
    if(dA<20) draggingVec="A"; else if(dB<20) draggingVec="B";
  });
  canvas.addEventListener("pointermove",(e)=>{
    if(!draggingVec) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    const mx = (e.clientX-rect.left)*scaleX - vecOrigin.x, my = (e.clientY-rect.top)*scaleY - vecOrigin.y;
    if(draggingVec==="A") vecA = {x:mx,y:my}; else vecB = {x:mx,y:my};
    if(state.selectedId && CONCEPTS[state.selectedId]) drawSimFrame(CONCEPTS[state.selectedId], false);
  });
  ["pointerup","pointerleave"].forEach(ev=>canvas.addEventListener(ev, ()=>draggingVec=null));
}
simState.selectedIsVector = ()=> state.selectedId && CONCEPTS[state.selectedId] && CONCEPTS[state.selectedId].sim==="vector";

renderPaneSim = function(c){ _origRenderPaneSim(c); attachVectorDrag(); };

function gradeQuiz(c){
  let correct=0;
  c.quiz.forEach((q,qi)=>{
    const sel = document.querySelector(`input[name="q${qi}"]:checked`);
    const selVal = sel ? Number(sel.value) : -1;
    const optEls = document.querySelectorAll(`.quizQ[data-qi="${qi}"] .qopt`);
    optEls.forEach((el,oi)=>{
      el.classList.remove("correct","wrong");
      if(oi===q.correct) el.classList.add("correct");
      else if(oi===selVal) el.classList.add("wrong");
    });
    document.getElementById("exp-"+qi).classList.add("show");
    if(selVal===q.correct) correct++;
  });
  const pct = Math.round((correct/c.quiz.length)*100);
  document.getElementById("quizScoreBadge").textContent = `Pontuação: ${correct}/${c.quiz.length} (${pct}%)`;
  const isFirst = !state.quizScores[c.id];
  state.quizScores[c.id] = {correct, total:c.quiz.length, pct};
  if(isFirst) addXP(5*correct + (pct===100?10:0), "quiz de "+c.name);
  else { checkBadges(); saveState(); }
}

function linesToFormulas(txt){
  return txt.split("\n").map(l=>l.trim()).filter(Boolean).map(line=>{
    const [latexPart, varsPart] = line.split("|");
    const vars = (varsPart||"").split(";").map(s=>s.trim()).filter(Boolean).map(pair=>{
      const idx = pair.indexOf("=");
      return idx>-1 ? [pair.slice(0,idx).trim(), pair.slice(idx+1).trim()] : [pair,""];
    });
    return {latex:(latexPart||"").trim(), vars};
  });
}
function formulasToLines(formulas){
  return (formulas||[]).map(f=>`${f.latex} | ${(f.vars||[]).map(v=>`${v[0]}=${v[1]}`).join("; ")}`).join("\n");
}
function linesToVideos(txt){
  return txt.split("\n").map(l=>l.trim()).filter(Boolean).map(line=>{
    const [id,title] = line.split("|").map(s=>s.trim());
    return {id, title:title||id};
  });
}
function videosToLines(videos){
  return (videos||[]).map(v=>`${v.id} | ${v.title}`).join("\n");
}
function linesToQuiz(txt){
  const blocks = txt.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
  return blocks.map(block=>{
    const lines = block.split("\n").map(l=>l.trim()).filter(Boolean);
    const q = lines[0]||"";
    const opts=[]; let correct=0, exp="";
    lines.slice(1).forEach(l=>{
      const optMatch = l.match(/^[A-D]\)\s*(.+)/i);
      if(optMatch) opts.push(optMatch[1]);
      else if(/^correta:/i.test(l)){
        const letter = l.split(":")[1].trim().toUpperCase();
        correct = "ABCD".indexOf(letter);
      } else if(/^explicação:/i.test(l)){
        exp = l.split(":").slice(1).join(":").trim();
      }
    });
    return {q, opts, correct: correct<0?0:correct, exp};
  });
}
function quizToLines(quiz){
  return (quiz||[]).map(q=>{
    const letters=["A","B","C","D"];
    return `${q.q}\n${q.opts.map((o,i)=>`${letters[i]}) ${o}`).join("\n")}\nCorreta: ${letters[q.correct]}\nExplicação: ${q.exp}`;
  }).join("\n\n");
}

      <label>Conceitos relacionados</label>
      <div class="checkGrid">
        ${otherConcepts.map(oid=>`<label><input type="checkbox" value="${oid}" ${((c.related||[]).includes(oid))?"checked":""}> ${CONCEPTS[oid].icon} ${CONCEPTS[oid].name}</label>`).join("")}
      </div>
    </div>
    <div class="saveBar">
      <button class="btnPrimary" id="f-save">💾 Salvar conceito</button>
      <button class="btnGhost" id="f-cancel">Cancelar</button>
    </div>
  `;
  document.getElementById("f-cancel").addEventListener("click", ()=>renderAdminForm(null));
  document.getElementById("f-save").addEventListener("click", async ()=>{
    const name = document.getElementById("f-name").value.trim();
    if(!name){ alert("Dê um nome ao conceito."); return; }
    const newId = isNew ? slug(name) : id;
    const related = Array.from(form.querySelectorAll(".checkGrid input:checked")).map(i=>i.value);
    const newConcept = {
      id:newId, isCenter:c.isCenter||false, name,
      icon:document.getElementById("f-icon").value.trim()||"⚛",
      color:"var(--velocidade-clr)", colorHex:document.getElementById("f-color").value,
      angle:Number(document.getElementById("f-angle").value)||0,
      radius:Number(document.getElementById("f-radius").value)||260,
      size:c.size||90, sim:document.getElementById("f-sim").value,
      summary:document.getElementById("f-summary").value.trim(),
      explanation:document.getElementById("f-explanation").value.trim(),
      images:document.getElementById("f-images").value.split("\n").map(s=>s.trim()).filter(Boolean),
      examples:document.getElementById("f-examples").value.split("\n").map(s=>s.trim()).filter(Boolean),
      curiosities:document.getElementById("f-curiosities").value.split("\n").map(s=>s.trim()).filter(Boolean),
      applications:document.getElementById("f-applications").value.split("\n").map(s=>s.trim()).filter(Boolean),
      formulas:linesToFormulas(document.getElementById("f-formulas").value),
      videos:linesToVideos(document.getElementById("f-videos").value),
      quiz:linesToQuiz(document.getElementById("f-quiz").value),
      related
    };
    if(!isNew && id!==newId){ delete CONCEPTS[id]; CONCEPT_ORDER = CONCEPT_ORDER.filter(x=>x!==id); }
    CONCEPTS[newId] = newConcept;
    if(!CONCEPT_ORDER.includes(newId)) CONCEPT_ORDER.push(newId);
    // keep relations bidirectional-ish (light touch): ensure center links to new node
    if(!newConcept.isCenter){
      const center = CONCEPT_ORDER.map(x=>CONCEPTS[x]).find(x=>x.isCenter);
      if(center && !center.related.includes(newId)) center.related.push(newId);
    }
    await saveConcepts();
    buildMap();
    renderAdminList();
    renderAdminForm(newId);
    toast("💾 Conceito salvo com sucesso!");
  });
}
function slug(s){
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"") || ("conceito-"+Date.now());
}

/* ======================================================================
   INIT
====================================================================== */
loadAll();

})();
</script>
